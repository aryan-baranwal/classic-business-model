<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f5efe6, #e8ddd4);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 420px;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 38px;
            color: #6d4c41;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #5d4037;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #d7ccc8;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #8d6e63;
            box-shadow: 0 0 8px rgba(141, 110, 99, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #8d6e63;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #6d4c41;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #6d4c41;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .login-container {
                width: 90%;
                padding: 30px;
            }

            h2 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Product Module Login</h2>

    <form>
        <label for="username">Username</label>
        <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
        >

        <label for="password">Password</label>
        <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
        >

        <button type="submit">Login</button>
    </form>

    <a href="/api/products" class="back-link">
        ← Back to Products
    </a>
</div>

</body>
</html>
