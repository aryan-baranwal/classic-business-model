<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Office Details</title>
</head>
<body>

<h2>Office Details</h2>

<p>
    Office Code:
    <span th:text="${office.officeCode}"></span>
</p>

<p>
    City:
    <span th:text="${office.city}"></span>
</p>

<p>
    Country:
    <span th:text="${office.country}"></span>
</p>

</body>
</html>
