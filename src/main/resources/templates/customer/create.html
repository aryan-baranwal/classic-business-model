<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Customer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #F4F6F9; color: #333333; }
        .top-bar { background-color: #004A8F; height: 5px; }
        .header { background-color: #0070AD; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { color: white; font-size: 22px; font-weight: bold; }
        .header span { color: #E8F4FD; font-size: 14px; }
        .container { max-width: 700px; margin: 32px auto; padding: 0 24px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #0070AD; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .page-title { font-size: 24px; font-weight: bold; color: #004A8F; margin-bottom: 4px; }
        .page-subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background-color: #0070AD; padding: 16px 24px; }
        .card-header h2 { color: white; font-size: 18px; }
        .card-body { padding: 28px; }
        .form-row { display: flex; gap: 16px; margin-bottom: 18px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #C0D8EE; border-radius: 4px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #0070AD; }
        .required { color: #C62828; }
        .form-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { padding: 10px 24px; background-color: #0070AD; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { background-color: #004A8F; }
        .btn-outline { background-color: white; color: #0070AD; border: 1px solid #0070AD; }
        .btn-outline:hover { background-color: #E8F4FD; }
        .footer { text-align: center; padding: 24px; color: #999; font-size: 12px; margin-top: 32px; }
        .section-label { font-size: 12px; font-weight: 700; color: #0070AD; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 6px; border-bottom: 2px solid #E8F4FD; }
    </style>
</head>
<body>

<div class="top-bar"></div>
<div class="header">
    <h1>⚡ Classic Business Model</h1>
    <span>Customer Management Module</span>
</div>

<div class="container">
    <a th:href="@{/customers}" class="back-link">← Back to Customer List</a>
    <div class="page-title">Create New Customer</div>
    <div class="page-subtitle">Fill in the details to register a new customer</div>

    <div class="card">
        <div class="card-header">
            <h2>Customer Information</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/customers/create}" method="post">

                <!-- CUSTOMER NUMBER -->
                <div class="section-label">Basic Information</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Customer Number <span class="required">*</span></label>
                        <input type="number" name="customerNumber"
                               placeholder="e.g. 500" required/>
                    </div>
                    <div class="form-group">
                        <label>Customer Name <span class="required">*</span></label>
                        <input type="text" name="customerName"
                               placeholder="e.g. ABC Stores" required/>
                    </div>
                </div>

                <!-- CONTACT -->
                <div class="section-label">Contact Person</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" name="contactFirstName"
                               placeholder="e.g. John" required/>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" name="contactLastName"
                               placeholder="e.g. Doe" required/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone <span class="required">*</span></label>
                        <input type="text" name="phone"
                               placeholder="e.g. +1 650 219 4782" required/>
                    </div>
                    <div class="form-group">
                        <label>Credit Limit</label>
                        <input type="number" name="creditLimit"
                               placeholder="e.g. 50000.00" step="0.01"/>
                    </div>
                </div>

                <!-- ADDRESS -->
                <div class="section-label">Address</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Address Line 1 <span class="required">*</span></label>
                        <input type="text" name="addressLine1"
                               placeholder="e.g. 100 Main Street" required/>
                    </div>
                    <div class="form-group">
                        <label>Address Line 2</label>
                        <input type="text" name="addressLine2"
                               placeholder="e.g. Suite 100"/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City <span class="required">*</span></label>
                        <input type="text" name="city"
                               placeholder="e.g. Paris" required/>
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" name="state"
                               placeholder="e.g. CA"/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" name="postalCode"
                               placeholder="e.g. 75001"/>
                    </div>
                    <div class="form-group">
                        <label>Country <span class="required">*</span></label>
                        <input type="text" name="country"
                               placeholder="e.g. France" required/>
                    </div>
                </div>

                <!-- BUTTONS -->
                <div class="form-actions">
                    <button type="submit" class="btn">✅ Create Customer</button>
                    <a th:href="@{/customers}" class="btn btn-outline">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 Capgemini — Classic Business Model Application
</div>

</body>
</html>
