<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customers - Classic Business Model</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cap-dark-blue: #001A30;
            --cap-dark-navy: #003057;
            --cap-blue: #0070AD;
            --cap-cyan: #12ABDB;
            --cap-light-blue: #E8F4FB;
            --cap-white: #FFFFFF;
            --cap-border: #D6E8F5;
            --cap-border-focus: #12ABDB;
            --shadow-sm: 0 2px 8px rgba(0, 48, 87, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 48, 87, 0.08);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F3F7FA;
            color: #2C3E50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 5px;
            background: linear-gradient(90deg, var(--cap-dark-navy) 0%, var(--cap-blue) 40%, var(--cap-cyan) 80%, #9FE5FC 100%);
            box-shadow: 0 2px 10px rgba(18, 171, 219, 0.3);
        }

        header {
            background-color: var(--cap-dark-navy);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--cap-blue), var(--cap-cyan));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0, 112, 173, 0.3);
        }

        .brand-logo svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--cap-white);
            stroke-width: 2.5;
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--cap-white);
            letter-spacing: -0.5px;
        }

        .brand-title span {
            background: linear-gradient(90deg, var(--cap-cyan), #9FE5FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn-portal-home,
        .btn-endpoints {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-portal-home {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--cap-white);
        }

        .btn-portal-home:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .module-label {
            color: #A8C8E0;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-endpoints {
            background: var(--cap-cyan);
            color: var(--cap-white);
            box-shadow: 0 4px 12px rgba(18, 171, 219, 0.25);
        }

        .btn-endpoints:hover {
            background: #0f93c0;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(18, 171, 219, 0.35);
        }

        .container {
            max-width: 1280px;
            margin: 32px auto;
            padding: 0 24px;
            width: 100%;
            flex: 1;
        }

        .page-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-info h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--cap-dark-navy);
            margin-bottom: 6px;
        }

        .page-info p {
            font-size: 14px;
            color: #627D98;
        }

        .btn-add {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--cap-blue) 0%, #005687 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(0, 112, 173, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 112, 173, 0.4);
        }

        .utility-bar {
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--cap-border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        .search-form {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) minmax(180px, 1fr) auto auto;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--cap-border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            color: #2C3E50;
            font-family: 'DM Sans', sans-serif;
        }

        .search-input:focus {
            border-color: var(--cap-border-focus);
            box-shadow: 0 0 0 3px rgba(18, 171, 219, 0.15);
        }

        .btn {
            padding: 9px 16px;
            background: var(--cap-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
            font-family: 'DM Sans', sans-serif;
        }

        .btn:hover {
            background: #005687;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: white;
            color: var(--cap-blue);
            border: 1.5px solid var(--cap-border);
        }

        .btn-outline:hover {
            background: var(--cap-light-blue);
            border-color: #B3DCF2;
        }

        .table-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--cap-border);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: #F4F8FB;
            border-bottom: 1.5px solid var(--cap-border);
        }

        thead th {
            padding: 16px 24px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #486581;
        }

        tbody tr {
            border-bottom: 1px solid #EEF2F6;
            transition: var(--transition);
        }

        tbody tr:hover {
            background-color: #F8FCFF;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 16px 24px;
            font-size: 14px;
            color: #334E68;
            vertical-align: middle;
        }

        .customer-number {
            font-family: 'DM Mono', monospace;
            font-weight: 700;
            color: var(--cap-blue);
            background: #EAF4FA;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 13px;
            display: inline-block;
        }

        .customer-link {
            color: var(--cap-dark-navy);
            text-decoration: none;
            font-weight: 600;
        }

        .customer-link:hover {
            color: var(--cap-blue);
        }

        .credit-limit {
            font-family: 'DM Mono', monospace;
            font-weight: 700;
            color: #005687;
        }

        .country-badge {
            display: inline-block;
            background: #ECEFF1;
            color: #37474F;
            border: 1px solid #CFD8DC;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 13px;
            font-weight: 700;
        }

        .actions-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }

        .btn-action {
            min-height: 32px;
            min-width: 64px;
            padding: 0 10px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--cap-border);
            background: white;
            cursor: pointer;
            transition: var(--transition);
            color: #486581;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-action:hover {
            background-color: var(--cap-light-blue);
            color: var(--cap-blue);
            border-color: #B3DCF2;
            transform: translateY(-1px);
        }

        .btn-action.btn-edit:hover {
            background-color: #FFF3E0;
            color: #E65100;
            border-color: #FFE0B2;
        }

        .btn-action.btn-credit:hover {
            background-color: #E3F2FD;
            color: #004A8F;
            border-color: #BBDEFB;
        }

        .btn-action.btn-delete:hover {
            background-color: #FFEBEE;
            color: #D32F2F;
            border-color: #FFCDD2;
        }

        footer {
            margin-top: auto;
            padding: 24px;
            text-align: center;
            border-top: 1px solid var(--cap-border);
            background: white;
            font-size: 13px;
            color: #829AB1;
        }

        footer strong {
            color: var(--cap-blue);
        }

        @media (max-width: 820px) {
            header {
                align-items: flex-start;
                gap: 16px;
                flex-direction: column;
            }

            .search-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="topbar"></div>
<header>
    <div class="brand-wrapper">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <div class="brand-title">Classic<span>Models</span></div>
    </div>
    <div class="header-right">
        <a href="/" class="btn-portal-home">Portal Home</a>
        <span class="module-label">Customer Management Module</span>
        <a href="/customers/dashboard" class="btn-endpoints">test endpoints</a>
    </div>
</header>

<main class="container">
    <div class="page-hero">
        <div class="page-info">
            <h2>Customer List</h2>
            <p>Manage and view all registered customers</p>
        </div>
        <a th:href="@{/customers/create}" class="btn-add">
            <span>+</span>
            Add New Customer
        </a>
    </div>

    <div class="utility-bar">
        <form th:action="@{/customers/search}" method="get" class="search-form">
            <input class="search-input" type="text" name="country" placeholder="Search by Country (e.g. France)"/>
            <input class="search-input" type="text" name="city" placeholder="Search by City (e.g. Nantes)"/>
            <button type="submit" class="btn">Search</button>
            <a th:href="@{/customers}" class="btn btn-outline">Reset</a>
        </form>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table>
                <thead>
                <tr>
                    <th style="width: 70px;">#</th>
                    <th style="width: 140px;">Customer No.</th>
                    <th>Name</th>
                    <th>City</th>
                    <th>Country</th>
                    <th>Credit Limit</th>
                    <th style="width: 340px; text-align: center;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer, stat : ${customers}">
                    <td th:text="${stat.count}"></td>
                    <td>
                        <span class="customer-number" th:text="${customer.customerNumber}"></span>
                    </td>
                    <td>
                        <a th:href="@{/customers/{id}(id=${customer.customerNumber})}"
                           th:text="${customer.customerName}"
                           class="customer-link">
                        </a>
                    </td>
                    <td th:text="${customer.city}"></td>
                    <td>
                        <span class="country-badge" th:text="${customer.country}"></span>
                    </td>
                    <td class="credit-limit" th:text="${customer.creditLimit}"></td>
                    <td>
                        <div class="actions-cell" style="justify-content: center;">
                            <a th:href="@{/customers/{id}(id=${customer.customerNumber})}"
                               class="btn-action">View</a>
                            <a th:href="@{/customers/{id}/edit(id=${customer.customerNumber})}"
                               class="btn-action btn-edit">Edit</a>
                            <a th:href="@{/customers/{id}/credit-limit(id=${customer.customerNumber})}"
                               class="btn-action btn-credit">Credit</a>
                            <form th:action="@{/customers/{id}/delete(id=${customer.customerNumber})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('Are you sure you want to delete this customer?')">
                                <button type="submit" class="btn-action btn-delete">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer>
    <strong>Classic Business Model</strong> Application
</footer>

</body>
</html>
