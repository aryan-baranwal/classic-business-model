<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #F4F6F9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-bar {
            background-color: #004A8F;
            height: 5px;
        }

        .header {
            background-color: #0070AD;
            padding: 16px 32px;
        }

        .header h1 {
            color: white;
            font-size: 20px;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            color: #004A8F;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #C0D8EE;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0070AD;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #0070AD;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-login:hover {
            background-color: #004A8F;
        }

        .footer {
            text-align: center;
            padding: 16px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="top-bar"></div>
<div class="header">
    <h1>⚡ Classic Business Model</h1>
</div>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Customer Module Login</h2>
        <p>Sign in to access customer management</p>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username"
                       placeholder="Enter your username"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       placeholder="Enter your password"/>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>
</div>

<div class="footer">
    © 2026 Capgemini — Classic Business Model Application
</div>

</body>
</html>
