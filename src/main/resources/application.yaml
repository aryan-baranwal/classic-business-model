server:
  port: 8080

spring:
  application:
    name: classicmodels

  config:
    import: optional:vault://

  cloud:
    vault:
      uri: ${VAULT_URL}
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret
        default-context: classicmodels

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

logging:
  level:
    org.springframework.vault: DEBUG
    org.springframework.cloud.vault: DEBUG